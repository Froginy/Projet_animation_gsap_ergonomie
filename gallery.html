<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styleLaly.css" />
    <link rel="stylesheet" href="/src/gallery.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Galerie - Nature Peinture</title>
  </head>
  <body>
    <nav>
      <h1>Nature Peinture</h1>
      <a href="index.html">Retour à l'accueil</a>
    </nav>

    <section class="intro">
      <div class="zoom-container">
        <!-- Static background image -->
        <img
          src="/src/assets/images/loutre.jpg"
          alt="Loutre"
          class="main-photo"
        />

        <!-- SVG Mask Overlay -->
        <svg
          class="text-mask"
          viewBox="0 0 1000 600"
          preserveAspectRatio="xMidYMid slice"
        >
          <defs>
            <mask id="mask-text" x="0" y="0" width="100%" height="100%">
              <!-- White is solid background -->
              <rect x="0" y="0" width="100%" height="100%" fill="white" />
              <!-- Black is transparent text window -->
              <text
                x="50%"
                y="30%"
                dominant-baseline="middle"
                text-anchor="middle"
                font-family="Lobster, sans-serif"
                font-size="200px"
                fill="black"
              >
                Découvrez
              </text>
              <text
                x="50%"
                y="54%"
                dominant-baseline="middle"
                text-anchor="middle"
                font-family="Lobster, sans-serif"
                font-size="200px"
                fill="black"
              >
                la
              </text>
              <text
                x="50%"
                y="78%"
                dominant-baseline="middle"
                text-anchor="middle"
                font-family="Lobster, sans-serif"
                font-size="200px"
                fill="black"
              >
                nature
              </text>
            </mask>
          </defs>
          <!-- The overlay colored layer -->
          <rect
            x="0"
            y="0"
            width="100%"
            height="100%"
            fill="#E9E7E5"
            mask="url(#mask-text)"
          />
        </svg>
      </div>
    </section>

    <main class="gallery-container">
      <div class="gallery-item">
        <img src="/src/assets/images/aurore.jpg" alt="Aurore" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/ecureuil.jpg" alt="Ecureuil" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/lievre.jpg" alt="Lièvre" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/loutre.jpg" alt="Loutre" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/mesange.jpg" alt="Mésange" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/mesange2.jpg" alt="Mésange 2" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/mouette.jpg" alt="Mouette" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/nelsun.jpg" alt="Nelsun" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/phoque.jpg" alt="Phoque" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/phoques.jpg" alt="Phoques" />
        <div class="overlay"></div>
      </div>
      <div class="gallery-item">
        <img src="/src/assets/images/vers.jpg" alt="Vers" />
        <div class="overlay"></div>
      </div>
    </main>
    <script type="module" src="/src/gallery.js"></script>
  </body>
</html>
